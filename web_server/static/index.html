<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge Event Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header id="header">
    <div class="header-brand">
      <div class="logo">▶</div>
      <h1>Edge Event Monitor</h1>
    </div>

    <div class="header-stats">
      <div class="stat-pill">
        <span>Events</span>
        <span class="val" id="stat-total">—</span>
      </div>
      <div class="stat-pill online">
        <span>Online</span>
        <span class="val" id="stat-online">—</span>
        <span>/</span>
        <span class="val" id="stat-devices">—</span>
      </div>
    </div>

    <div id="ws-status">
      <div id="ws-dot"></div>
      <span id="ws-label">Connecting…</span>
    </div>

    <div id="clock">—</div>
  </header>

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-header">Edge Devices</div>
    <div id="device-list">
      <div style="padding:20px; text-align:center; color:var(--text-dim); font-size:12px;">
        Waiting for devices…
      </div>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────────── -->
  <main id="main">
    <!-- Controls -->
    <div id="controls">
      <div class="filter-group">
        <input id="f-project" type="text" placeholder="Project…" />
        <input id="f-device"  type="text" placeholder="Device…" />
        <input id="f-plate"   type="text" placeholder="Biển số…" />
        <select id="f-type">
          <option value="">All types</option>
          <option value="license_plate_detected">LPR</option>
          <option value="vehicle_detected">Vehicle</option>
          <option value="error">Error</option>
        </select>
        <button class="btn-primary" onclick="applyFilters()">Tìm</button>
        <button class="btn-secondary" onclick="clearFilters()">Reset</button>
      </div>
      <div class="btn-group">
        <button class="btn-secondary" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
        <button class="btn-danger"    onclick="clearFeed()">✕ Clear</button>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed-wrapper">
      <div id="pause-banner">⏸ Feed paused — new events buffered</div>
      <div id="feed-empty">
        <div class="empty-icon">📡</div>
        <div>Đang chờ sự kiện từ thiết bị biên…</div>
        <div style="font-size:11px; color:var(--text-dim)">Events will appear here in real time</div>
      </div>
      <div id="feed"></div>
    </div>
  </main>
</div>

<!-- ── Overlay ──────────────────────────────────────────────── -->
<div id="overlay" onclick="closeDrawer()"></div>

<!-- ── Detail Drawer ────────────────────────────────────────── -->
<div id="drawer">
  <div class="drawer-header">
    <h3>Event Detail</h3>
    <button id="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div id="drawer-body"><!-- filled by JS --></div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
